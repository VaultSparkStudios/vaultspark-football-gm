# Deploy gating trade-off: GitHub Actions cannot combine `workflow_run` (depend on
# ci.yml) with per-workflow path filters, so the "gate" job below is a fast test
# prerequisite inside this workflow to keep path-filter triggers; full CI still runs
# in parallel in ci.yml. The gate runs the studio shard (protocol-truth) so a push
# that breaks tests cannot publish Pages artifacts.
name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "package.json"
      - "public/**"
      - "scripts/build-pages.mjs"
      - "src/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run studio shard (protocol truth)
        run: npm run test:studio

  build:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VITE_APP_BASE_PATH: /vaultspark-football-gm/
      VITE_CANONICAL_URL: https://vaultsparkstudios.com/vaultspark-football-gm/
      VITE_OG_IMAGE_URL: https://vaultsparkstudios.com/vaultspark-football-gm/images/cover.png
      VITE_DOMAIN: vaultsparkstudios.com
      VITE_API_ORIGIN: ${{ vars.API_ORIGIN }}
      VITE_GAME_SERVICE_ORIGIN: ${{ vars.GAME_SERVICE_ORIGIN }}
      API_ORIGIN: ${{ vars.API_ORIGIN }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      VSFGM_RUNTIME_DEFAULT: client
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Pages bundle
        run: npm run build:pages

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # The install step has hung indefinitely after a completed Chromium download
      # (run 26918582803 burned the full 25m job budget). Bounded attempt + one retry.
      - name: Install Playwright browser
        id: pw-install
        timeout-minutes: 6
        continue-on-error: true
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      - name: Retry Playwright browser install
        if: steps.pw-install.outcome != 'success'
        timeout-minutes: 6
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      - name: Smoke static Pages client
        timeout-minutes: 5
        run: npm run smoke:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
