name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-shards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [core, runtime, sim:contract, sim:realism, studio]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.shard }} shard
        run: npm run test:${{ matrix.shard }}

  browser-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # The install step has hung indefinitely after a completed Chromium download
      # (run 26918582829 burned the full 30m job budget). Bounded attempt + one retry.
      - name: Install Playwright browser
        id: pw-install
        timeout-minutes: 6
        continue-on-error: true
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      - name: Retry Playwright browser install
        if: steps.pw-install.outcome != 'success'
        timeout-minutes: 6
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install --with-deps chromium

      - name: Verify Pages build
        run: npm run build:pages
        env:
          VITE_APP_BASE_PATH: /vaultspark-football-gm/
          VSFGM_RUNTIME_DEFAULT: client

      - name: Smoke static Pages client
        timeout-minutes: 5
        run: npm run smoke:pages

      - name: Run UI tests
        timeout-minutes: 15
        run: npm run test:ui
