# VaultSpark Studios — canonical Dependabot auto-merge (CANON-043).
# Source of truth: vaultspark-studio-ops/docs/templates/project-system/.github/workflows/dependabot-auto-merge.yml
#
# Clears the alert pile automatically: for Dependabot PRs that are patch or
# minor (incl. grouped security updates), enable GitHub auto-merge so the PR
# merges once required checks pass. If a repo has no required checks, auto-merge
# completes immediately. MAJOR bumps are never auto-merged — they wait for a human.
#
# Safe by construction:
#   • acts ONLY on PRs opened by dependabot[bot]
#   • patch/minor only (semver-major excluded)
#   • uses the built-in GITHUB_TOKEN — no extra secrets
#   • fully reversible (delete this file)
#
# Requires the repo setting "Allow auto-merge" (enabled portfolio-wide by
# scripts/enable-repo-security.mjs --apply).
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch & minor
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
