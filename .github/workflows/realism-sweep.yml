name: Realism Sweep

# Deep statistical confidence sweep with its own time budget.
# Never wired into the push-blocking path — scheduled + manual only.
on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

jobs:
  deep-realism:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Long smoke shard (determinism + career realism)
        timeout-minutes: 20
        run: npm run test:long

      - name: Deep realism verification (24-season sample)
        timeout-minutes: 60
        run: node src/data/scripts/verifyRealism.js --seasons 24 | tee realism-sweep-report.txt

      - name: Upload sweep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realism-sweep-report
          path: realism-sweep-report.txt
          if-no-files-found: ignore
