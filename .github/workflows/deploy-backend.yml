# Deploy gating trade-off: GitHub Actions cannot combine `workflow_run` (depend on
# ci.yml) with per-workflow path filters, so the "gate" job below is a fast test
# prerequisite inside this workflow to keep path-filter triggers; full CI still runs
# in parallel in ci.yml. The gate runs the studio shard (protocol-truth) so a push
# that breaks tests cannot build/push GHCR images. The manual-dispatch deploy-server
# job depends on build-images, so it transitively depends on the gate too.
name: Deploy Backend Runtime

on:
  workflow_dispatch:
    inputs:
      deploy_to_server:
        description: "Also deploy the latest images to the configured backend host"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "Dockerfile.runtime"
      - "package.json"
      - "package-lock.json"
      - "ops/**"
      - "public/**"
      - "src/**"

permissions:
  contents: read
  packages: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24.14.0" # pinned: Node 24.16 hangs playwright install post-download (S14 evidence: runs 26991314776, 26991314875)
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run studio shard (protocol truth)
        run: npm run test:studio

  build-images:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        service:
          - play
          - api
    env:
      GAME_SLUG: vaultspark-football-gm
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: image-owner
        shell: bash
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ steps.image-owner.outputs.value }}/${{ env.GAME_SLUG }}-${{ matrix.service }}:latest
            ghcr.io/${{ steps.image-owner.outputs.value }}/${{ env.GAME_SLUG }}-${{ matrix.service }}:${{ github.sha }}

  deploy-server:
    needs: build-images
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_server }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Copy backend ops files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.BACKEND_SSH_HOST }}
          username: ${{ secrets.BACKEND_SSH_USER }}
          key: ${{ secrets.BACKEND_SSH_KEY }}
          source: "ops/*"
          target: ${{ secrets.BACKEND_DEPLOY_PATH }}
          overwrite: true

      - name: Deploy updated containers
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
        with:
          host: ${{ secrets.BACKEND_SSH_HOST }}
          username: ${{ secrets.BACKEND_SSH_USER }}
          key: ${{ secrets.BACKEND_SSH_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            docker compose -f deploy-backend.docker-compose.yml pull
            docker compose -f deploy-backend.docker-compose.yml up -d
