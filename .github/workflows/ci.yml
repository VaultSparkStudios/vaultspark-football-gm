name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-shards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [core, runtime, sim:contract, sim:realism, studio]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.shard }} shard
        run: npm run test:${{ matrix.shard }}

  browser-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify Pages build
        run: npm run build:pages
        env:
          VITE_APP_BASE_PATH: /vaultspark-football-gm/
          VSFGM_RUNTIME_DEFAULT: client

      - name: Smoke static Pages client
        run: npm run smoke:pages

      - name: Run UI tests
        run: npm run test:ui
