version: "3.9"

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - franchise-architect-football-play
      - franchise-architect-football-api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  franchise-architect-football-play:
    image: ghcr.io/vaultsparkstudios/franchise-architect-football-play:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DOMAIN: vaultsparkstudios.com
      GAME_SLUG: franchise-architect-football
      GAME_PUBLIC_ORIGIN: https://playfranchisearchitect.com/
      GAME_SERVICE_ORIGIN: https://play-franchise-architect-football.vaultsparkstudios.com
      API_ORIGIN: https://api-franchise-architect-football.vaultsparkstudios.com
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL via deployment secrets}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  franchise-architect-football-api:
    image: ghcr.io/vaultsparkstudios/franchise-architect-football-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8081
      DOMAIN: vaultsparkstudios.com
      GAME_SLUG: franchise-architect-football
      APP_ORIGIN: https://playfranchisearchitect.com/
      GAME_SERVICE_ORIGIN: https://play-franchise-architect-football.vaultsparkstudios.com
      API_ORIGIN: https://api-franchise-architect-football.vaultsparkstudios.com
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL via deployment secrets}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
